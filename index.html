<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<!-- Lanzar SIN barra del navegador al "Añadir a pantalla de inicio" (iOS y Android) -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Alien Pocho">
<meta name="theme-color" content="#000000">
<title>Alien Pocho</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #000; color: #36c8ff;
    font-family: "Courier New", monospace;
    overflow: hidden;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }
  /* Escenario: [controles izq] [pantalla] [controles der] centrados */
  #stage {
    display: flex; align-items: center; justify-content: center;
    gap: 1.5vw; width: 100vw; height: 100dvh; box-sizing: border-box; padding: 4px;
  }
  /* La pantalla ocupa el MÁXIMO por altura, manteniendo 4:3 */
  #screen {
    position: relative; flex: 0 0 auto;
    height: min(96dvh, 62vw); aspect-ratio: 4 / 3;
    background: #000; border: 2px solid #0a5a5a; border-radius: 7px;
    box-shadow: 0 0 34px rgba(0, 210, 210, 0.22), inset 0 0 0 1px rgba(0,0,0,0.6);
  }
  #game {
    image-rendering: pixelated; image-rendering: crisp-edges;
    width: 100%; height: 100%; display: block; border-radius: 5px;
  }
  #screen::after {
    content: ""; position: absolute; inset: 0; pointer-events: none; border-radius: 5px;
    background: repeating-linear-gradient(0deg,
      rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(0,0,0,0.16) 3px, rgba(0,0,0,0) 4px);
    box-shadow: inset 0 0 70px rgba(0,0,0,0.5);
  }
  /* Mandos táctiles a los lados */
  .pad { flex: 0 0 auto; display: flex; flex-direction: column;
         align-items: center; justify-content: center; gap: clamp(10px, 4vh, 30px); }
  /* mando de movimiento en TRIÁNGULO: avanzar arriba, girar izq/der abajo */
  .pad.tri { gap: clamp(8px, 2.2vh, 18px); }
  .tri-row { display: flex; gap: clamp(10px, 3vh, 26px); }
  /* mando de acciones: coger (izq) + saltar (der) en fila */
  .pad.row { flex-direction: row; gap: clamp(16px, 4vh, 34px); }
  .btn {
    width: clamp(46px, 12vh, 88px); height: clamp(46px, 12vh, 88px);
    border-radius: 50%; border: 2px solid #0a8a8a; background: rgba(0,40,46,0.55);
    color: #6fdede; font-size: clamp(20px, 5vh, 34px); line-height: 1;
    display: flex; align-items: center; justify-content: center;
    touch-action: none; cursor: pointer; user-select: none;
  }
  .btn.big { border-color: #18b6b6; color: #bdf7f7; }
  .btn.jump { border-color: #8b76c4; color: #b9a6ff; }
  .btn.on { background: #0a5a5a; color: #fff; }
  .btn.jump.on { background: #352a55; color: #fff; }
  /* Botón de PANTALLA COMPLETA (esquina). Solo en táctil; se oculta por JS si el
     navegador no soporta la Fullscreen API o si ya se abrió como app (standalone). */
  #fsbtn {
    position: fixed; top: 6px; right: 6px; z-index: 10; display: none;
    width: 34px; height: 34px; padding: 0; border-radius: 8px;
    border: 1px solid #0a8a8a; background: rgba(0,40,46,0.55); color: #6fdede;
    font-size: 18px; line-height: 1; cursor: pointer;
    align-items: center; justify-content: center;
  }
  @media (pointer: coarse) { #fsbtn { display: flex; } }
  /* En móvil VERTICAL: NO se rota. Pantalla ARRIBA y los dos mandos ABAJO (mover a la
     izquierda, acciones a la derecha). Grid recoloca sin depender del orden del HTML. */
  @media (orientation: portrait) and (pointer: coarse) {
    #stage {
      display: grid; row-gap: 5vh; column-gap: 4vw; padding: 2vh 2vw;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto;          /* bloque compacto (pantalla + mandos)... */
      grid-template-areas:
        "screen screen"
        "move   act";
      align-content: center;                  /* ...centrado verticalmente en la pantalla */
      justify-items: center; align-items: center;
    }
    #screen { grid-area: screen; width: min(96vw, 72vh); height: auto; }
    .pad.tri { grid-area: move; }
    .pad.row { grid-area: act; }
    /* En vertical el límite es el ANCHO: dimensionar botones por vw para que las dos
       mitades (mover / acciones) quepan sin desbordar. */
    .btn { width: clamp(44px, 16vw, 74px); height: clamp(44px, 16vw, 74px); font-size: clamp(18px, 6vw, 30px); }
    .pad.row { gap: clamp(14px, 4.5vw, 26px); }
    .pad.tri { gap: clamp(6px, 2vw, 14px); }
    .tri-row { gap: clamp(8px, 3vw, 18px); }
  }
</style>
</head>
<body>
  <div id="stage">
    <div class="pad tri">
      <button class="btn big" data-code="ArrowUp" aria-label="avanzar">▲</button>
      <div class="tri-row">
        <button class="btn" data-code="ArrowLeft"  aria-label="girar izquierda">⟲</button>
        <button class="btn" data-code="ArrowRight" aria-label="girar derecha">⟳</button>
      </div>
    </div>
    <div id="screen"><canvas id="game" width="320" height="240"></canvas></div>
    <div class="pad row">
      <button class="btn" data-code="KeyE" aria-label="coger o colocar">✋</button>
      <button class="btn big jump" data-code="Space" aria-label="saltar">⤒</button>
    </div>
  </div>
  <button id="fsbtn" aria-label="pantalla completa" title="Pantalla completa">⛶</button>

<script src="engine.js?v=10"></script>
<script src="assets.js?v=10"></script>
<script src="game.js?v=10"></script>
<script>
"use strict";

/* =========================================================================
   CONFIG — constantes globales (estética + geometría isométrica)
   ========================================================================= */
const CFG = {
  W: 320, H: 240,
  TILE_W: 34,               // sala grande dejando una banda inferior para el marcador
  TILE_H: 17,               // (se mantiene el iso 2:1 clásico)
  BLOCK_H: 17,
  WALK: 3.0,                // velocidad de avance (celdas/seg)
  PRAD: 0.32,               // radio de colisión del jugador
  STEP: 0.08,               // altura máx. salvable andando (sin saltar)
  TURN_TIME: 0.12,          // duración del giro de 90° (anim/cooldown)
  GRAVITY: 22,              // gravedad (celdas/seg^2)
  // Salto de UN botón: pulsación < JUMP_TAP_TIME => bajo/corto; si se mantiene => alto/largo.
  JUMP_TAP_TIME: 0.14,              // umbral (seg) entre pulsación corta y larga
  JUMP_LOW:  { vz: 5.0, vh: 2.2 },  // corto y bajo  (apex ~0.57 celdas)
  JUMP_HIGH: { vz: 7.6, vh: 3.4 },  // largo y alto  (apex ~1.31, sube 1 bloque)
  COL: {
    bg:        "#000000",
    floorLine: "#0c4747",
    floorFill: "#04181b",
    floorFill2:"#020f12",   // tablero sutil del suelo
    top:       "#22cccc",   // rampa cian coherente (luz desde arriba)
    left:      "#168f8f",
    right:     "#0c6363",
    edge:      "#6fdede",   // arista suave (antes casi blanca = ruido)
    shadow:    "#010a0a",
    botTop:    "#8ffcff",
    botLeft:   "#3ad0d0",
    botRight:  "#1f9c9c",
    botDark:   "#063636",
    botEdge:   "#eaffff",
    hud:       "#00e0e0",
    hudDim:    "#066",
    hudBright: "#dfffff",
    roomName:  "#b9a6ff",   // morado sutil para el nombre de la sala (a juego con el botón saltar)
    accent:    "#ff5d7a",   // acento rojo/rosa (guiño a la pastilla de "LIGHT YEARS")
    accentDim: "#5e1024"
  }
};

/* =========================================================================
   CONTROLS — asignación de teclas (PARAMETRIZABLE). Cada acción admite
   varias teclas. Códigos: https://developer.mozilla.org/docs/Web/API/KeyboardEvent/code
   ========================================================================= */
const CONTROLS = {
  turnLeft:  ["ArrowLeft", "KeyA"],
  turnRight: ["ArrowRight", "KeyD"],
  forward:   ["ArrowUp", "KeyW"],
  jump:      ["Space"],           // botón único: corto = salto bajo, largo = salto alto
  use:       ["KeyE", "Enter"]    // recoger / soltar circuito
};

// El pico (vértice frontal) de la sala baja hasta la cima del marcador inferior;
// arriba queda una banda fina para el título y abajo el marco estilo Alien 8.
const ORIGIN = { x: CFG.W / 2, y: 66 };

/* La proyección iso real la aporta AP.projector (ver `P` más abajo), compartida
   con assets.js para que dibujo y lógica usen exactamente la misma geometría. */

/* =========================================================================
   INPUT — estado de teclado
   ========================================================================= */
const keys = Object.create(null);
const BOUND_CODES = new Set(Object.values(CONTROLS).flat());
addEventListener("keydown", e => {
  keys[e.code] = true;
  if (BOUND_CODES.has(e.code)) e.preventDefault();
});
addEventListener("keyup", e => { keys[e.code] = false; });

/* Detección de flancos de teclado (pulsación nueva este frame) */
const prevKeys = Object.create(null);
function edge(code) { return keys[code] && !prevKeys[code]; }

/* Helpers de acciones según CONTROLS (parametrizable) */
const held    = (action) => CONTROLS[action].some(c => keys[c]);
const pressed = (action) => CONTROLS[action].some(c => edge(c));

/* =========================================================================
   RENDER — suelo + (cubos y jugador) ordenados por profundidad + HUD
   (La SIMULACIÓN —salas, física, entidades, estado— vive en game.js.)
   ========================================================================= */
const ctx = document.getElementById("game").getContext("2d");
const P = AP.projector(ORIGIN.x, ORIGIN.y,    // proyector iso para los assets
  { TILE_W: CFG.TILE_W, TILE_H: CFG.TILE_H, BLOCK_H: CFG.BLOCK_H });

/* (Los assets de dibujo —suelo, cubos, robot, sombra…— viven en assets.js:
   AP.floor / AP.cube / AP.flatWall / AP.robot / AP.shadow / etc.) */

/* El ORDEN DE PINTADO (painter por cajas) vive ahora en engine.js → ENGINE.depthSort. */

function render(room) {
  ctx.fillStyle = CFG.COL.bg;
  ctx.fillRect(0, 0, CFG.W, CFG.H);

  const ink = room.ink, WH = 2.2, D = AP.DOOR;
  const doorSpan = (n) => [n / 2 - 1.12, n / 2 + 1.12]; // vano estrecho (hueco ~1.44 celdas)

  // 1) Suelo (plano en z=0, nunca ocluye → pre-pase al fondo)
  for (let y = 0; y < room.h; y++)
    for (let x = 0; x < room.w; x++)
      AP.floor(ctx, P, x, y, ink);

  // 1b) Paredes/puertas del FONDO (siempre detrás de todo → pre-pase)
  AP.flatWall(ctx, P, "x", 0, 0, room.w, WH, ink);                       // borde y=0 (atrás-dcha)
  if (room.exits.ym) { const [s0, s1] = doorSpan(room.w); AP.door(ctx, P, "x", 0, s0, s1, WH, ink, true); }
  AP.flatWall(ctx, P, "y", 0, 0, room.h, WH, ink);                       // borde x=0 (atrás-izq)
  if (room.exits.xm) { const [s0, s1] = doorSpan(room.h); AP.door(ctx, P, "y", 0, s0, s1, WH, ink, true); }

  // 2) Objetos como CAJAS para el pintor topológico
  const draws = [];
  const box3 = (x0, y0, z0, x1, y1, z1, draw) => draws.push({ x0, y0, z0, x1, y1, z1, draw });

  // bloques (un cubo por capa)
  for (const bl of room.blocks)
    for (let k = 0; k < bl.h; k++) {
      const z = bl.z + k;
      box3(bl.x, bl.y, z, bl.x + 1, bl.y + 1, z + 1, () => AP.cube(ctx, P, bl.x, bl.y, z, ink));
    }
  // pinchos / zócalos / circuitos sueltos (a su altura oz)
  for (const hz of room.hazards)
    box3(hz.cx + 0.2, hz.cy + 0.2, 0, hz.cx + 0.8, hz.cy + 0.8, 0.5,
         () => AP.spikes(ctx, P, hz.cx + 0.5, hz.cy + 0.5, 0, ink));
  for (const s of room.sockets) { const oz = s.z || 0;
    box3(s.cx + 0.16, s.cy + 0.16, oz, s.cx + 0.84, s.cy + 0.84, oz + 0.4,
         () => AP.socket(ctx, P, s.cx + 0.5, s.cy + 0.5, oz, s.shape, s.active, ink)); }
  // objetos físicos (circuitos transportables): caja de profundidad = su sólido.
  for (const o of room.objects) { const m = AP.PROP.HALF;
    box3(o.x - m, o.y - m, o.z, o.x + m, o.y + m, o.z + AP.PROP.H,
         () => AP.prop(ctx, P, o.x, o.y, o.z, o.shape, ink)); }

  // entidades (jugador y, en Fase 6, pinchos/enemigos): cada una añade su caja al orden.
  for (const e of entities) e.addDraws(draws, room);

  // puertas del FRENTE descompuestas en piezas (2 postes + dintel) → entran en el orden
  // como cualquier objeto, así el robot se intercala solo al cruzar (postes con z hasta
  // el dintel para que el dintel siempre quede por encima).
  if (room.exits.yp) {
    const [s0, s1] = doorSpan(room.w), h = room.h, zL = WH - D.LINTEL_H;
    box3(s0, h - D.T, 0, s0 + D.POST_W, h, zL, () => AP.doorPost(ctx, P, "x", h, s0, s0 + D.POST_W, WH, ink));
    box3(s1 - D.POST_W, h - D.T, 0, s1, h, zL, () => AP.doorPost(ctx, P, "x", h, s1 - D.POST_W, s1, WH, ink));
    box3(s0, h - D.T, zL, s1, h, WH, () => AP.doorLintel(ctx, P, "x", h, s0, s1, WH, ink));
  }
  if (room.exits.xp) {
    const [s0, s1] = doorSpan(room.h), w = room.w, zL = WH - D.LINTEL_H;
    box3(w - D.T, s0, 0, w, s0 + D.POST_W, zL, () => AP.doorPost(ctx, P, "y", w, s0, s0 + D.POST_W, WH, ink));
    box3(w - D.T, s1 - D.POST_W, 0, w, s1, zL, () => AP.doorPost(ctx, P, "y", w, s1 - D.POST_W, s1, WH, ink));
    box3(w - D.T, s0, zL, w, s1, WH, () => AP.doorLintel(ctx, P, "y", w, s0, s1, WH, ink));
  }

  // 3) Ordenar topológicamente y pintar
  for (const it of ENGINE.depthSort(draws, P)) it.draw();

  drawHUD();
  if (game.won) drawWinBanner();
}

/* Banner de victoria (provisional; la pantalla final llega en la Fase 8) */
function drawWinBanner() {
  ctx.fillStyle = "rgba(0,0,0,0.55)";
  ctx.fillRect(0, CFG.H / 2 - 22, CFG.W, 44);
  ctx.fillStyle = CFG.COL.hudBright;
  ctx.font = "14px 'Courier New', monospace";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText("¡MISION COMPLETA!", CFG.W / 2, CFG.H / 2 - 4);
  ctx.fillStyle = CFG.COL.hud; ctx.font = "8px 'Courier New', monospace";
  ctx.fillText("pulsa un boton para volver a jugar", CFG.W / 2, CFG.H / 2 + 12);
  ctx.textAlign = "left"; ctx.textBaseline = "top";
}

/* --- Helpers de HUD --- */
// Barra vertical segmentada (las "esquineras" del marco original Alien 8)
function drawSegBar(cx, y0, y1, col) {
  ctx.fillStyle = col || CFG.COL.hud;
  for (let y = y0; y < y1; y += 6) ctx.fillRect(cx - 3, y, 6, 4);
}
// Casilla del objeto que llevas: marco cuadrado centrado en (cx,cy); si hay objeto,
// se dibuja centrado y RECORTADO dentro del marco (sea cual sea su forma).
function drawCarrySlot(cx, cy, shape, ink) {
  const s = 11;                                   // semilado del marco
  ctx.strokeStyle = ink; ctx.lineWidth = 1;
  ctx.strokeRect(cx - s + 0.5, cy - s + 0.5, s * 2 - 1, s * 2 - 1);
  if (!shape) return;
  ctx.save();
  ctx.beginPath(); ctx.rect(cx - s + 1, cy - s + 1, s * 2 - 2, s * 2 - 2); ctx.clip();
  AP.circuit(ctx, AP.projector(cx, cy + 4), 0, 0, 0, shape, ink);   // base baja → centra el cubo
  ctx.restore();
}
// Mini robot (icono de vidas)
function drawMiniRobot(x, y) {
  const C = CFG.COL;
  ctx.fillStyle = C.botTop; ctx.fillRect(x, y + 1, 8, 7);          // cuerpo/cabeza
  ctx.strokeStyle = C.botEdge; ctx.lineWidth = 1; ctx.strokeRect(x + 0.5, y + 1.5, 7, 6);
  ctx.fillStyle = C.botDark; ctx.fillRect(x + 1, y + 3, 6, 2);     // visor
  ctx.fillStyle = C.botEdge; ctx.fillRect(x + 2, y + 3, 1, 1); ctx.fillRect(x + 5, y + 3, 1, 1); // ojos
  ctx.beginPath(); ctx.moveTo(x + 4.5, y + 1); ctx.lineTo(x + 4.5, y - 1); ctx.stroke(); // antena
}
/* HUD — homenaje al marcador de Alien 8: marco inferior con barras segmentadas a los
   lados y líneas en "V" hacia el centro, que enmarcan las dos zonas triangulares.
   Izquierda = CIRCUITOS (icono = forma que llevas) · Derecha = VIDAS. Sin años luz.
   Se dibuja en último lugar, por encima de todo. */
function drawHUD() {
  const C = CFG.COL, W = CFG.W;
  ctx.textBaseline = "top";

  // ── Sala actual (arriba-derecha) ──
  if (room && room.name) {
    ctx.textAlign = "right"; ctx.fillStyle = C.roomName; ctx.font = "11px 'Courier New', monospace";
    ctx.fillText(room.name, W - 8, 4); ctx.textAlign = "left";
  }

  // ── Marco inferior: barras segmentadas + aristas PARALELAS a los bordes inferiores
  //    de la sala (pendiente ±0.5 = TILE_H/TILE_W), del color de la sala. Aprovecha el
  //    hueco que deja el rombo isométrico, prolongando su silueta. Vértice de la "V"
  //    bajo el pico de la sala (160). El contenido va DENTRO de las zonas delimitadas.
  const ink = room.ink, barTop = 146, vx = 160, vy = barTop + 0.5 * (vx - 6);
  drawSegBar(6, barTop, 236, ink);
  drawSegBar(W - 6, barTop, 236, ink);
  ctx.strokeStyle = ink; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(6, barTop);     ctx.lineTo(vx, vy);     // arista izquierda  (∥ borde sala)
  ctx.moveTo(W - 6, barTop); ctx.lineTo(vx, vy);     // arista derecha
  ctx.stroke();

  // ── Zona izquierda (dentro del marco): CIRCUITOS — marco cuadrado + objeto dentro ──
  drawCarrySlot(36, 204, game.carried, ink);
  ctx.fillStyle = C.hudBright; ctx.font = "bold 16px 'Courier New', monospace";
  ctx.fillText(game.circuits + "/" + game.circuitsTotal, 54, 196);

  // ── Zona derecha (dentro del marco): VIDAS — carita alineada con el número ──
  drawMiniRobot(W - 60, 201);
  ctx.fillStyle = C.hudBright; ctx.font = "bold 16px 'Courier New', monospace";
  ctx.textAlign = "right"; ctx.fillText("×" + game.lives, W - 26, 196); ctx.textAlign = "left";

  // ── Título "ALIEN POCHO" abajo-centro, partido por el pico del marco ──
  drawTitle(vx, vy);
}

/* Título con look "neón futurista": glow en el color de la sala + núcleo blanco con
   contorno; las dos palabras flanquean el pico (vx) del marco inferior. */
function drawTitle(vx, vy) {
  const C = CFG.COL, ink = room.ink, y = vy + 2, gap = 12;
  ctx.save();
  ctx.font = "bold 15px 'Courier New', monospace";
  ctx.letterSpacing = "2px";
  ctx.textBaseline = "top";
  ctx.lineJoin = "round";
  const draw = () => {
    ctx.textAlign = "right"; ctx.strokeText("ALIEN", vx - gap, y); ctx.fillText("ALIEN", vx - gap, y);
    ctx.textAlign = "left";  ctx.strokeText("POCHO", vx + gap, y); ctx.fillText("POCHO", vx + gap, y);
  };
  ctx.shadowColor = ink; ctx.shadowBlur = 6;          // resplandor (color de la sala)
  ctx.lineWidth = 3; ctx.strokeStyle = ink; ctx.fillStyle = ink;
  draw();
  ctx.shadowBlur = 0;                                  // núcleo nítido y brillante
  ctx.lineWidth = 2; ctx.strokeStyle = ink; ctx.fillStyle = C.hudBright;
  draw();
  ctx.letterSpacing = "0px";
  ctx.restore();
}

/* =========================================================================
   PANTALLA DE TÍTULO — marco sci-fi pixel-art + logo neón + créditos
   ========================================================================= */
// Marco grande estilo panel de nave: doble borde, línea segmentada, corchetes de
// esquina y remaches. Todo a base de rectángulos → look pixel-art al escalar.
function drawSciFiFrame(x, y, w, h) {
  const C = CFG.COL;
  const R = (xx, yy, ww, hh, col) => { ctx.fillStyle = col; ctx.fillRect(xx, yy, ww, hh); };
  // borde exterior grueso (cian)
  R(x, y, w, 3, C.hud); R(x, y + h - 3, w, 3, C.hud);
  R(x, y, 3, h, C.hud); R(x + w - 3, y, 3, h, C.hud);
  // línea interior segmentada (tenue)
  const ix = x + 7, iy = y + 7, iw = w - 14, ih = h - 14;
  for (let i = 0; i <= iw; i += 7) { R(ix + i, iy, 4, 1, C.hudDim); R(ix + i, iy + ih, 4, 1, C.hudDim); }
  for (let j = 0; j <= ih; j += 7) { R(ix, iy + j, 1, 4, C.hudDim); R(ix + iw, iy + j, 1, 4, C.hudDim); }
  // corchetes de esquina (acento)
  const L = 18, t = 3;
  R(x, y, L, t, C.accent);                 R(x, y, t, L, C.accent);                  // sup-izq
  R(x + w - L, y, L, t, C.accent);         R(x + w - t, y, t, L, C.accent);          // sup-der
  R(x, y + h - t, L, t, C.accent);         R(x, y + h - L, t, L, C.accent);          // inf-izq
  R(x + w - L, y + h - t, L, t, C.accent); R(x + w - t, y + h - L, t, L, C.accent);  // inf-der
  // remaches en mitad de cada lado
  R(x + w / 2 - 2, y, 4, 3, C.accent); R(x + w / 2 - 2, y + h - 3, 4, 3, C.accent);
  R(x, y + h / 2 - 2, 3, 4, C.accent); R(x + w - 3, y + h / 2 - 2, 3, 4, C.accent);
}

function drawTitleScreen(now) {
  const C = CFG.COL, W = CFG.W, H = CFG.H;
  ctx.fillStyle = C.bg; ctx.fillRect(0, 0, W, H);

  const m = 12;
  ctx.fillStyle = "rgba(0,28,32,0.55)"; ctx.fillRect(m, m, W - 2 * m, H - 2 * m);
  drawSciFiFrame(m, m, W - 2 * m, H - 2 * m);

  // Logo "ALIEN POCHO" en dos líneas, estilo neón (glow + núcleo blanco)
  const neon = (txt, cy, size) => {
    ctx.save();
    ctx.font = "bold " + size + "px 'Courier New', monospace";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.letterSpacing = "3px"; ctx.lineJoin = "round";
    ctx.shadowColor = C.hud; ctx.shadowBlur = 8;
    ctx.lineWidth = 4; ctx.strokeStyle = C.hud; ctx.fillStyle = C.hud;
    ctx.strokeText(txt, W / 2, cy); ctx.fillText(txt, W / 2, cy);
    ctx.shadowBlur = 0; ctx.lineWidth = 2; ctx.strokeStyle = C.hud; ctx.fillStyle = C.hudBright;
    ctx.strokeText(txt, W / 2, cy); ctx.fillText(txt, W / 2, cy);
    ctx.letterSpacing = "0px"; ctx.restore();
  };
  neon("ALIEN", 56, 34);
  neon("POCHO", 92, 34);

  // Mascota robot centrada
  const pm = AP.projector(W / 2, 150);
  AP.shadow(ctx, pm, 0, 0, 0);
  AP.robot(ctx, pm, 0, 0, 0, 0, C.hud, {});

  // Créditos (lo que pidió Azahara)
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillStyle = C.hudBright; ctx.font = "12px 'Courier New', monospace";
  ctx.fillText("Hecho por Azahara con Claude Code 4.8", W / 2, 178);

  // Prompt parpadeante
  if (Math.floor(now / 500) % 2 === 0) {
    ctx.fillStyle = C.accent; ctx.font = "bold 12px 'Courier New', monospace";
    ctx.fillText("PULSA UN BOTON PARA EMPEZAR", W / 2, 204);
  }
  ctx.textAlign = "left"; ctx.textBaseline = "top";
}

/* =========================================================================
   MAIN — bucle de juego con requestAnimationFrame + delta-time
   (world/room/checkExits/resetGame y la física viven en game.js.)
   ========================================================================= */
let last = performance.now();
function loop(now) {
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  if (game.state === "title") {
    // Cualquier acción (incluye botones táctiles) arranca la partida.
    if (pressed("jump") || pressed("use") || pressed("forward")) {
      resetGame(); game.state = "playing";
    }
    drawTitleScreen(now);
  } else {
    for (const e of entities) e.update(room, dt);
    checkExits();
    if (!game.won) game.lightYears = Math.max(0, game.lightYears - dt * 6); // cuenta atrás (cosmética por ahora)
    render(room);
  }
  // Snapshot de teclas para los flancos del próximo frame: UNA sola vez por frame,
  // tras actualizar todas las entidades (en título y en juego).
  for (const k in keys) prevKeys[k] = keys[k];
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

/* API mínima para pruebas automáticas */
window.__pocho = { player, entities, game, get room() { return room; }, world };
</script>

<script>
/* Controles táctiles en pantalla → reusan el teclado del juego (mismos códigos,
   así el salto corto/largo depende también de cuánto mantengas pulsado). */
(function () {
  "use strict";
  const send = (code, down) =>
    window.dispatchEvent(new KeyboardEvent(down ? "keydown" : "keyup", { code, bubbles: true }));
  document.querySelectorAll(".btn").forEach(function (b) {
    const code = b.dataset.code;
    const down = (e) => { e.preventDefault(); b.classList.add("on"); send(code, true); };
    const up   = (e) => { e.preventDefault(); b.classList.remove("on"); send(code, false); };
    b.addEventListener("pointerdown", down);
    b.addEventListener("pointerup", up);
    b.addEventListener("pointerleave", up);
    b.addEventListener("pointercancel", up);
    b.addEventListener("contextmenu", (e) => e.preventDefault());
  });
})();

/* Botón de PANTALLA COMPLETA (Fullscreen API). En iPhone/Safari no existe esta API:
   ahí se oculta el botón y la vía es "Compartir → Añadir a pantalla de inicio", que
   con las meta tags lanza el juego sin barra. Si ya está en modo app, también se oculta. */
(function () {
  "use strict";
  const fsbtn = document.getElementById("fsbtn");
  const root = document.documentElement;
  const enter = root.requestFullscreen || root.webkitRequestFullscreen;
  const exit  = document.exitFullscreen || document.webkitExitFullscreen;
  const isFs  = () => document.fullscreenElement || document.webkitFullscreenElement;
  const isStandalone = matchMedia("(display-mode: standalone)").matches || window.navigator.standalone;
  if (!enter || isStandalone) { fsbtn.style.display = "none"; return; }
  fsbtn.addEventListener("click", () => {
    if (isFs()) exit.call(document); else enter.call(root);
  });
  document.addEventListener("fullscreenchange", () => { fsbtn.textContent = isFs() ? "🗗" : "⛶"; });
})();
</script>
