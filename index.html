<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<!-- Lanzar SIN barra del navegador al "Añadir a pantalla de inicio" (iOS y Android) -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Alien Pocho">
<meta name="theme-color" content="#000000">
<title>Alien Pocho</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="stage">
    <div class="pad tri">
      <button class="btn big sec" data-code="KeyE" aria-label="coger o colocar">
        <svg class="ico-hand" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
          <path d="M18 11V6a2 2 0 0 0-2-2 2 2 0 0 0-2 2"/>
          <path d="M14 10V4a2 2 0 0 0-2-2 2 2 0 0 0-2 2v2"/>
          <path d="M10 10.5V6a2 2 0 0 0-2-2 2 2 0 0 0-2 2v8"/>
          <path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-6-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.83L7 15"/>
        </svg>
      </button>
      <div class="tri-row">
        <button class="btn" data-code="ArrowLeft" aria-label="girar izquierda">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
          </svg>
        </button>
        <button class="btn" data-code="ArrowRight" aria-label="girar derecha">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
            <path d="M21 12a9 9 0 1 1-9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/>
          </svg>
        </button>
      </div>
    </div>
    <div id="screen"><canvas id="game" width="320" height="240"></canvas><a id="assetslink" href="assets-demo.html">assets ›</a></div>
    <div class="pad row">
      <button class="btn big sec" data-code="Space" aria-label="saltar">
        <svg class="ico-jump" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
          <path d="M12 3v11"/>
          <path d="M7 8l5-5 5 5"/>
          <path d="M5 19q7-5 14 0"/>
        </svg>
      </button>
      <button class="btn big" data-code="ArrowUp" aria-label="avanzar">
        <!-- flecha en PERSPECTIVA: punta (lejos) arriba y estrecha, base (cerca) abajo más ancha -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
          <path d="M12 2.5 5 9 10.5 9 7 21 17 21 13.5 9 19 9Z"/>
        </svg>
      </button>
    </div>
  </div>
  <button id="fsbtn" aria-label="pantalla completa" title="Pantalla completa">⛶</button>

  <!-- Punto de entrada: ES module. Importa engine/assets/config/input/view/world/game.
       Requiere servir por http (no file://): `npm run serve` o el server de .claude/launch.json. -->
  <script type="module" src="src/main.js"></script>
</body>
</html>
