<svg viewBox="-16 -12 32 20" xmlns="http://www.w3.org/2000/svg">
  <!-- peana: cara +x (derecha, en sombra) -->
  <path d="M15.3 -4.08 L0 3.57 L0 7.65 L15.3 0 Z" fill="rgb(158,158,158)" stroke="#000000" stroke-width="1" stroke-linejoin="round"/>
  <!-- peana: cara +y (izquierda, media) -->
  <path d="M-15.3 -4.08 L0 3.57 L0 7.65 L-15.3 0 Z" fill="rgb(209,209,209)" stroke="#000000" stroke-width="1" stroke-linejoin="round"/>
  <!-- peana: techo / reborde (iluminado) -->
  <path d="M0 -11.73 L15.3 -4.08 L0 3.57 L-15.3 -4.08 Z" fill="#ffffff" stroke="#000000" stroke-width="1" stroke-linejoin="round"/>
  <!-- indentación cuadrada: pared trasera -y -->
  <path d="M0 -10.03 L11.9 -4.08 L11.9 -1.7 L0 -7.65 Z" fill="rgb(102,102,102)" stroke="#000000" stroke-width="1" stroke-linejoin="round"/>
  <!-- indentación cuadrada: pared trasera -x -->
  <path d="M0 -10.03 L-11.9 -4.08 L-11.9 -1.7 L0 -7.65 Z" fill="rgb(77,77,77)" stroke="#000000" stroke-width="1" stroke-linejoin="round"/>
  <!-- indentación cuadrada: suelo de la cavidad -->
  <path d="M0 -7.65 L11.9 -1.7 L0 4.25 L-11.9 -1.7 Z" fill="rgb(56,56,56)" stroke="#000000" stroke-width="1" stroke-linejoin="round"/>
</svg>
